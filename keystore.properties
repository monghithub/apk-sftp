# Keystore configuration for signing release APK
# IMPORTANT: Never commit with actual values to repository!
# Generate keystore with: keytool -genkey -v -keystore release-key.keystore -keyalg RSA -keysize 2048 -validity 10000 -alias release-key

storeFile=release-key.keystore
storePassword=YOUR_STORE_PASSWORD_HERE
keyAlias=release-key
keyPassword=YOUR_KEY_PASSWORD_HERE
